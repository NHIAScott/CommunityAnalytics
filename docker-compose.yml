services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/data/analytics.duckdb
      - RAW_UPLOAD_DIR=/data/raw_uploads
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
